name: Release SDKs

on:
  push:
    branches:
      - main
      - beta

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          npm install --no-save --legacy-peer-deps
          pip install build twine

      - name: Verify commit messages
        run: npm run commit:lint || true

      - name: Build all SDKs
        run: npm run build:all

      - name: Test all SDKs
        run: npm run test:all

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: npm run release

      - name: Deploy CDN to Cloudflare Pages
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler

          # Create deployment directory
          mkdir -p cdn/deploy
          cp cdn/dist/sdk.min.js cdn/deploy/sdk.min.js
          cp cdn/dist/sdk.esm.js cdn/deploy/sdk.esm.js
          cp cdn/dist/sdk.d.ts cdn/deploy/sdk.d.ts

          # Create wrangler.toml for Pages
          cat > wrangler.toml << 'EOF'
          name = "devutils-sdk-cdn"
          type = "javascript"

          [env.production]
          vars = { ENVIRONMENT = "production" }
          EOF

          # Deploy to Cloudflare Pages (auto-creates project if doesn't exist)
          wrangler pages deploy cdn/deploy \
            --project-name devutils-sdk-cdn \
            --branch main

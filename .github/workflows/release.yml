name: Release SDKs

on:
  push:
    branches:
      - main
      - beta

permissions:
  contents: write
  pull-requests: write
  id-token: write # needed for PyPI trusted publishing (optional but good practice)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm install --no-save

      - name: Install Python build tools
        run: pip install build twine

      - name: Verify commit messages
        run: npm run commit:lint || true

      - name: Build all SDKs
        run: npm run build:all

      - name: Test all SDKs
        run: npm run test:all

      - name: Release (npm + PyPI + GitHub)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: npm run release

      - name: Deploy CDN to Cloudflare Pages
        # Only run on main, and only if the release step actually produced dist files
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Guard: skip gracefully if secrets not configured yet
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "⚠️  Cloudflare secrets not configured — skipping CDN deploy"
            exit 0
          fi

          # Guard: ensure CDN was actually built
          if [ ! -f "cdn/dist/sdk.min.js" ] || [ ! -f "cdn/dist/sdk.esm.js" ]; then
            echo "❌ CDN build output missing — did build:cdn succeed?"
            exit 1
          fi

          # Install wrangler
          npm install -g wrangler

          # Prepare deploy directory
          mkdir -p cdn/deploy
          cp cdn/dist/sdk.min.js  cdn/deploy/sdk.min.js
          cp cdn/dist/sdk.esm.js  cdn/deploy/sdk.esm.js
          [ -f cdn/dist/sdk.d.ts ] && cp cdn/dist/sdk.d.ts cdn/deploy/sdk.d.ts

          # Minimal landing page
          cat > cdn/deploy/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>DevUtils SDK CDN</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 700px; margin: 60px auto; padding: 0 20px; }
              code, pre { background: #f4f4f4; border-radius: 4px; }
              code { padding: 2px 6px; }
              pre { padding: 14px; overflow-x: auto; }
            </style>
          </head>
          <body>
            <h1>DevUtils SDK CDN</h1>
            <p>Browser-ready SDK for the DevUtils API.</p>
            <h2>Script tag</h2>
            <pre>&lt;script src="https://cdn.devutils.in/sdk.min.js"&gt;&lt;/script&gt;</pre>
            <h2>ESM import</h2>
            <pre>import SDK from 'https://cdn.devutils.in/sdk.esm.js';</pre>
            <p><a href="https://docs.devutils.in">Documentation</a> · <a href="https://github.com/devutils/sdks">GitHub</a></p>
          </body>
          </html>
          HTMLEOF

          # Deploy — wrangler auto-creates the project on first run
          echo "🚀 Deploying to Cloudflare Pages (project: devutils-sdk-cdn)..."
          wrangler pages deploy cdn/deploy \
            --project-name devutils-sdk-cdn \
            --branch main

          echo "✅ CDN deployed → https://devutils-sdk-cdn.pages.dev"

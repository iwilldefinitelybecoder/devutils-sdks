[tox]
envlist = py38,py39,py310,py311,py312,lint,type

[testenv]
deps =
    pytest>=7.0.0
    pytest-cov>=4.0.0
    pytest-asyncio>=0.21.0
commands =
    pytest {posargs}

[testenv:lint]
deps =
    flake8>=6.0.0
    black>=23.0.0
    isort>=5.12.0
commands =
    black --check devutils_sdk tests
    isort --check-only devutils_sdk tests
    flake8 devutils_sdk tests

[testenv:type]
deps =
    mypy>=1.0.0
    types-requests
commands =
    mypy devutils_sdk

[testenv:format]
deps =
    black>=23.0.0
    isort>=5.12.0
commands =
    black devutils_sdk tests
    isort devutils_sdk tests

[pytest]
testpaths = tests
python_files = test_*.py
addopts = --cov=devutils_sdk --cov-report=term-missing --cov-report=html

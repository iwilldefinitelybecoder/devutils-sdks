<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DevUtils SDK CDN</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 60px auto;
        padding: 0 20px;
      }
      code,
      pre {
        background: #f4f4f4;
        border-radius: 4px;
      }
      code {
        padding: 2px 6px;
      }
      pre {
        padding: 14px;
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <h1>DevUtils SDK CDN</h1>
    <p>Browser-ready SDK for the DevUtils API.</p>
    <h2>Script tag</h2>
    <pre>&lt;script src="https://cdn.devutils.in/sdk.min.js"&gt;&lt;/script&gt;</pre>
    <h2>ESM import</h2>
    <pre>import SDK from 'https://cdn.devutils.in/sdk.esm.js';</pre>
    <p>
      <a href="https://docs.devutils.in">Documentation</a> ·
      <a href="https://github.com/iwilldefinitelybecoder/devutils-sdks">GitHub</a>
    </p>
